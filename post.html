<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post — Stafferton Consulting</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .post-hero {
      padding: 140px 40px 60px;
      max-width: 760px;
      margin: 0 auto;
    }
    .post-content {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 40px 100px;
      font-size: 16px;
      line-height: 1.85;
      color: rgba(255,255,255,0.75);
    }
    .post-content h2 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      color: var(--white);
      margin: 40px 0 16px;
    }
    .post-content p { margin-bottom: 20px; }
    .post-content a { color: var(--accent); }
    .post-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      margin-bottom: 32px;
      transition: color 0.2s;
    }
    .post-back:hover { color: var(--white); }
    .post-category {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .post-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .post-meta {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 40px;
    }
    .post-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin-bottom: 40px;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><img src="SCL-LOGO-2018-GREY.png" alt="Stafferton Consulting" /></a>
  <ul class="nav-links">
    <li><a href="index.html#services">Services</a></li>
    <li><a href="index.html#process">Process</a></li>
    <li><a href="index.html#pricing">Pricing</a></li>
    <li><a href="blog.html" style="color:var(--accent)">Blog</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="contact.html" class="nav-cta">Book a Call</a></li>
  </ul>
  <button class="nav-mobile-toggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="post-hero">
  <a href="blog.html" class="post-back">← Back to Blog</a>
  <div id="post-category" class="post-category"></div>
  <h1 id="post-title" class="post-title">Loading...</h1>
  <div id="post-meta" class="post-meta"></div>
  <div class="post-divider"></div>
</div>

<div class="post-content" id="post-content">
</div>

<section style="background:#0d0d0d;padding:80px 40px;text-align:center">
  <h2 class="section-title" style="font-size:36px">Ready to Automate?</h2>
  <p style="color:rgba(255,255,255,0.5);margin-bottom:28px">Let's talk about what we can build for your business.</p>
  <a href="contact.html" class="btn-primary">Book a Free Call</a>
</section>

<footer>
  <div class="footer-inner">
    <a href="index.html" class="footer-logo"><img src="SCL-LOGO-2018-GREY.png" alt="Stafferton Consulting" /></a>
    <div class="footer-links">
      <a href="index.html#services">Services</a>
      <a href="blog.html">Blog</a>
      <a href="contact.html">Contact</a>
      <a href="admin.html">Admin</a>
    </div>
    <span class="footer-copy">© 2025 Stafferton Consulting</span>
  </div>
</footer>

<script src="js/cms.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const slug = params.get('slug');
const post = CMS.posts.find(p => p.slug === slug);

if (post) {
  document.title = post.title + ' — Stafferton Consulting';
  document.getElementById('post-category').textContent = post.category;
  document.getElementById('post-title').textContent = post.title;
  document.getElementById('post-meta').textContent = post.date + ' · ' + post.readTime;
  document.getElementById('post-content').innerHTML = post.content || '<p>' + post.excerpt + '</p>';
} else {
  document.getElementById('post-title').textContent = 'Post not found';
  document.getElementById('post-content').innerHTML = '<p>Sorry, this post could not be found. <a href="blog.html">Back to blog →</a></p>';
}
</script>
<script src="js/main.js"></script>
</body>
</html>
