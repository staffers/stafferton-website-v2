<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Stafferton Digital</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .post-hero { padding: 140px 40px 60px; max-width: 760px; margin: 0 auto; }
    .post-content { max-width: 760px; margin: 0 auto; padding: 0 40px 100px; font-size: 16px; line-height: 1.85; color: rgba(255,255,255,0.75); }
    .post-content h2 { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--white); margin: 40px 0 16px; }
    .post-content p { margin-bottom: 20px; }
    .post-content a { color: var(--accent); }
    .post-back { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.4); text-decoration: none; margin-bottom: 32px; transition: color 0.2s; }
    .post-back:hover { color: var(--white); }
    .post-category { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    .post-title { font-family: var(--font-display); font-size: clamp(28px, 4vw, 44px); font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 16px; }
    .post-meta { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 40px; }
    .post-divider { height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 40px; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><img src="stafferton-logo.png" alt="Stafferton Digital" /></a>
  <ul class="nav-links">
    <li><a href="index.html#services">Services</a></li>
    <li><a href="index.html#process">Process</a></li>
    <li><a href="index.html#pricing">Pricing</a></li>
    <li><a href="blog.html" style="color:var(--accent)">Blog</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="contact.html" class="nav-cta">Book a Call</a></li>
  </ul>
  <button class="nav-mobile-toggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="post-hero">
  <a href="/blog/" class="post-back">← Back to Blog</a>
  <div id="post-category" class="post-category"></div>
  <h1 id="post-title" class="post-title">Loading...</h1>
  <div id="post-meta" class="post-meta"></div>
  <div class="post-divider"></div>
</div>

<div class="post-content" id="post-content"></div>

<section style="background:#0d0d0d;padding:80px 40px;text-align:center">
  <h2 class="section-title" style="font-size:36px">Ready to Automate?</h2>
  <p style="color:rgba(255,255,255,0.5);margin-bottom:28px">Let's talk about what we can build for your business.</p>
  <a href="contact.html" class="btn-primary">Book a Free Call</a>
</section>

<footer>
  <div class="footer-inner">
    <a href="index.html" class="footer-logo"><img src="stafferton-logo.png" alt="Stafferton Digital" /></a>
    <div class="footer-links">
      <a href="index.html#services">Services</a>
      <a href="blog.html">Blog</a>
      <a href="contact.html">Contact</a>
      <a href="admin.html">Admin</a>
    </div>
    <span class="footer-copy">© Stafferton Digital</span>
  </div>
</footer>

<script>
const CMS = {
  posts: [
    { id: 1, slug: "ai-automation-seo", category: "SEO", title: "How AI Automation is Transforming SEO in 2025", excerpt: "Discover how forward-thinking agencies are using AI to automate keyword research, content optimisation, and technical audits at scale.", date: "12 Feb 2025", readTime: "5 min read", icon: "🤖", content: "<p>Artificial intelligence has moved from novelty to necessity in the world of SEO. Agencies that embraced AI tooling early are now running comprehensive audits in hours rather than days.</p><h2>What's Actually Changing</h2><p>Three areas are seeing the most disruption: technical auditing, keyword clustering, and content briefing. AI tools now handle the grunt work in all three, freeing up strategists to focus on interpretation and client communication.</p>" },
    { id: 2, slug: "content-strategy-boutique-agencies", category: "Strategy", title: "Content Strategy for Boutique Digital Agencies", excerpt: "Smaller agencies have a unique advantage in content marketing — authenticity. Here's how to turn that into a repeatable growth engine.", date: "5 Feb 2025", readTime: "7 min read", icon: "📝", content: "<p>Boutique agencies often feel outgunned when it comes to content. But volume was always the wrong game to play. The agencies winning on organic search in 2025 are winning on depth, specificity, and genuine expertise.</p><p>Your client case studies are your most powerful content asset.</p>" },
    { id: 3, slug: "local-seo-guide-2025", category: "Local SEO", title: "The Complete Local SEO Guide for UK Businesses", excerpt: "Google's local search landscape has evolved significantly. This guide covers everything UK businesses need to know to dominate their local market.", date: "28 Jan 2025", readTime: "9 min read", icon: "📍", content: "<p>Local SEO in the UK has its own distinct quirks. The single biggest leverage point for most local businesses remains Google Business Profile — fully optimised and actively managed.</p>" }
  ]
};
(function() { try { const s = localStorage.getItem('cms_data'); if (s) { const d = JSON.parse(s); if (d.posts) CMS.posts = d.posts; } } catch(e) {} })();

// Nav
const nav = document.querySelector('nav');
window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 40));
const toggle = document.querySelector('.nav-mobile-toggle');
const links = document.querySelector('.nav-links');
if (toggle) toggle.addEventListener('click', () => links.classList.toggle('open'));
document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', () => links.classList.remove('open')));

// Load post
const params = new URLSearchParams(window.location.search);
const post = CMS.posts.find(p => p.slug === params.get('slug'));
if (post) {
  document.title = post.title + ' — Stafferton Digital';
  document.getElementById('post-category').textContent = post.category;
  document.getElementById('post-title').textContent = post.title;
  document.getElementById('post-meta').textContent = post.date + ' · ' + post.readTime;
  document.getElementById('post-content').innerHTML = post.content || '<p>' + post.excerpt + '</p>';
} else {
  document.getElementById('post-title').textContent = 'Post not found';
  document.getElementById('post-content').innerHTML = '<p>Sorry, this post could not be found. <a href="blog.html">Back to blog →</a></p>';
}
</script>
</body>
</html>
